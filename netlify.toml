[build]
  command = "bunx prisma generate && bun run build"
  publish = ".next"

[functions]
  # Prisma Client는 외부 모듈로 처리 (번들 크기 초과 방지)
  # included_files = ["**"] 제거 → node_modules 전체 번들링 방지
  external_node_modules = ["@prisma/client"]
  included_files = ["node_modules/.prisma/client/**"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions."api/gallery"]
  max_duration = 30

[functions."api/gallery/presign"]
  max_duration = 15

[functions."api/gallery/commit"]
  max_duration = 30
